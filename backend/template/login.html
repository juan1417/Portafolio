<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #1e1e1e;
           color: #d4d4d4; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; }
    .box { background: #252526; border: 1px solid #3c3c3c;
           border-radius: 6px; padding: 32px; width: 360px; }
    .title { color: #4ec9b0; font-size: 16px; margin-bottom: 8px; }
    .comment { color: #6a9955; font-size: 12px; margin-bottom: 24px; }
    label { font-size: 12px; color: #858585; display: block; margin-bottom: 4px; }
    input { width: 100%; background: #1e1e1e; border: 1px solid #3c3c3c;
            color: #d4d4d4; padding: 8px 12px; border-radius: 3px;
            font-family: inherit; font-size: 14px; margin-bottom: 16px; }
    button { width: 100%; background: #264f78; color: #9cdcfe;
             border: none; padding: 10px; border-radius: 3px;
             font-family: inherit; font-size: 14px; cursor: pointer; }
    button:hover { background: #1e3a5f; }
    .error { color: #f48771; font-size: 12px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="box">
    <p class="title">// admin.login()</p>
    <p class="comment">// portfolio control panel</p>
    <label for="email">_email:</label>
    <input id="email" type="email" placeholder="admin@email.com" />
    <label for="password">_password:</label>
    <input id="password" type="password" placeholder="••••••••" />
    <button onclick="login()">authenticate</button>
    <p class="error" id="error">// error: invalid credentials</p>
  </div>
  <script>
  async function login() {
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    })
    if (res.ok) {
      window.location.href = '/admin/'
    } else {
      document.getElementById('error').style.display = 'block'
    }
  }
  </script>
</body>
</html>
